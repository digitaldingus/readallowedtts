<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .container {
            background-color: #2c2c2c; /* Status bar button dark background */
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 512px;
            height: 512px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        img {
            width: 320px;
            height: 320px;
            filter: invert(1); /* Makes the black SVG white */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/microsoft/vscode-codicons/main/src/icons/megaphone.svg" />
    </div>
</body>
</html>
